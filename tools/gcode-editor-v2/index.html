<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gcode Editor</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Phosphor icons for elegant minimalist icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!--<script type="module" src="../../main.js"></script>-->
    <!--<my-header></my-header>-->

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="logo-area">
            <i class="ph ph-code-block"></i>
            <h1>G-coder by LRM</h1>
        </div>
        <div class="header-actions">
            <!-- Toggle Panel Button (Hidden until a file is loaded) -->
            <button id="toggle-panel-btn" class="icon-btn hidden" title="Toggle Controls">
                <i class="ph ph-sidebar-simple"></i>
            </button>
        </div>
    </nav>

    <div class="app-container">

        <!-- Main Workspace (Editor / Dropzone) -->
        <main class="workspace">

            <!-- File Upload Area -->
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <i class="ph ph-file-arrow-up"></i>
                    <h3>Upload GCode File</h3>
                    <p>Drag & drop your .txt, .nc, .NC, or .T file here</p>
                    <p class="text-small">or click to browse</p>
                </div>
                <input type="file" id="file-input" accept=".txt,.nc,.NC,.T">
            </div>

            <!-- Code Editor Area -->
            <div id="editor-container" class="editor-container hidden">
                <div class="editor-header">
                    <div style="display: flex; align-items: center; gap: 16px; margin-right: auto;">
                        <div class="status-indicator">
                            <!--<span class="dot empty"></span>-->
                            <input type="text" id="stat-filename" class="inline-input" style="width: 200px;"
                                value="No file loaded" title="Edit filename">
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button id="btn-close" class="action-btn" style="padding: 4px; height: 32px; min-width: 32px;" title="Close File">
                                <i class="ph ph-x"></i><span class="btn-text"></span>
                            </button>
                            <button id="btn-copy" class="action-btn" style="padding: 4px; height: 32px; min-width: 32px;" title="Copy">
                                <i class="ph ph-copy"></i><span class="btn-text"></span>
                            </button>
                            <button id="btn-download" class="action-btn primary" style="padding: 4px; height: 32px; min-width: 32px;" title="Download">
                                <i class="ph ph-download-simple"></i><span class="btn-text"></span>
                            </button>
                        </div>
                        
                    </div>
                </div>

                <textarea id="code-editor" spellcheck="false" placeholder="Or paste your GCode here..."></textarea>
            </div>
        </main>

        <!-- Right Panel Space (Collapsible Controls) -->
        <aside id="controls-panel" class="controls-panel hidden">
            <div id="panel-resizer" class="panel-resizer"></div>
            <div class="panel-inner">
                <!--<h2 class="panel-title">Controls & Data</h2>-->

                <div class="info-section form-card printable-section">
                    <!--<h3><i class="ph ph-info"></i> Job Information</h3>-->
                    <div class="inline-inputs-row">
                        <input type="text" id="part-number" class="inline-input" style="width: 100px;" placeholder="Part Number">
                        <input type="text" id="operation-number" class="inline-input" style="width: 100px;" placeholder="Operation Number">
                    </div>
                </div>

                <div class="settings-section form-card">
                    <!--<h3><i class="ph ph-sliders-horizontal"></i> GCode Modifications</h3>-->
                    <div class="mod-tabs">
                        <button class="mod-tab active" data-target="mod-header">Header</button>
                        <button class="mod-tab" data-target="mod-probing">Probing</button>
                        <button class="mod-tab" data-target="mod-length">Length Setting</button>
                        <button class="mod-tab" data-target="mod-tools">Variable Tools</button>
                        <button class="mod-tab" data-target="mod-zones">Variable Zones</button>
                    </div>

                    <div class="mod-content active" id="mod-header">
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="header-stamp-toggle">Timestamped Updates</label>
                            <label class="switch">
                                <input type="checkbox" id="header-stamp-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="header-tools-toggle">Tool List</label>
                            <label class="switch">
                                <input type="checkbox" id="header-tools-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="header-vars-toggle">Variables List</label>
                            <label class="switch">
                                <input type="checkbox" id="header-vars-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="header-safety-toggle">Safety Lines</label>
                            <label class="switch">
                                <input type="checkbox" id="header-safety-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        
                        <!-- History Container -->
                        <div id="header-comments-config" class="probing-config hidden">
                            <h4 style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;">Update History</h4>
                            <div id="header-comments-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;">
                                <!-- Injected by JS -->
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="new-comment-input" class="inline-input wide" placeholder="Describe update...">
                                <button id="btn-add-comment" class="action-btn" style="padding: 4px 12px; height: 32px;"><i class="ph ph-plus"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="mod-content" id="mod-probing">
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="probing-toggle">Enable Probing (#800)</label>
                            <label class="switch">
                                <input type="checkbox" id="probing-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <!-- Probing Configuration (shown when probing is enabled) -->
                        <div id="probing-config" class="probing-config hidden">
                            <div id="probing-cycles-list">
                                <!-- Probe cycle cards injected by JS -->
                            </div>
                            <button id="btn-add-probe" class="action-btn"
                                style="margin-top: 10px; width: 100%; justify-content: center;">
                                <i class="ph ph-plus"></i> Add Probe Cycle
                            </button>
                        </div>
                    </div>

                    <div class="mod-content" id="mod-length">
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="length-toggle">Enable Length Measurement (#899)</label>
                            <label class="switch">
                                <input type="checkbox" id="length-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div id="length-config" class="probing-config hidden">
                            <h4 style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;">Tool Measurements</h4>
                            <div id="tool-measurements-list" style="display: flex; flex-direction: column; gap: 8px;">
                                <!-- Injected by JS -->
                            </div>
                        </div>
                    </div>

                    <div class="mod-content" id="mod-tools">
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="var-tools-toggle">Enable Variable Tools (#801-#850)</label>
                            <label class="switch">
                                <input type="checkbox" id="var-tools-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>

                    <div class="mod-content" id="mod-zones">
                        <div class="input-group" style="padding-top: 0; border: none;">
                            <label for="var-zones-toggle">Enable Variable Work Zones (#851-#856)</label>
                            <label class="switch">
                                <input type="checkbox" id="var-zones-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Program Summary Section -->
                <div class="table-section form-card printable-section">
                    <!--<div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="margin-bottom: 0;"><i class="ph ph-list-dashes"></i> Program Summary</h3>
                        <button id="btn-print" class="action-btn" style="padding: 6px 12px;">
                            <i class="ph ph-printer"></i> <span class="btn-text">Print Summary</span>
                        </button>
                    </div> -->
                    <div
                        style="display: flex; justify-content: space-between; align-items: center;">
                        <h4
                            style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                            Work Zones</h4>
                        <button id="btn-print" class="action-btn" style="padding: 6px 12px;">
                            <i class="ph ph-printer"></i> <span class="btn-text">Print Summary</span>
                        </button>
                    </div>
                    <div class="zones-container" id="zones-container"
                        style="max-height: max-content; margin-bottom: 24px;">
                        <!-- Data populated by JS -->
                    </div>

                    <h4
                        style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                        Tool Operations</h4>
                    <div class="table-container">
                        <table id="ops-table">
                            <thead>
                                <tr>
                                    <th>N</th>
                                    <th>Tool</th>
                                    <th>Description</th>
                                    <th title="Program Stop">M00</th>
                                    <th title="Optional Stop">M01</th>
                                    <th title="Coolant">M08</th>
                                    <th>Subprograms</th>
                                    <th>Feed</th>
                                     <th>Speed</th>
                                     <th>Min Z</th>
                                     <th>X Range</th>
                                     <th>Y Range</th>
                                </tr>
                            </thead>
                            <tbody id="ops-table-body">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </aside>

    </div>

    <script src="js/gcode-parser.js"></script>
    <script src="js/probing-generator.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
