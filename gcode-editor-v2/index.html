<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gcode Editor</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor icons for elegant minimalist icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <script type="module" src="../../main.js"></script>
    <main class="wrapper-wide">
        <my-header></my-header>
    
        <!-- Everything below header -->
        <div class="app-container">
            <!-- Top action bar -->
            <div class="editor-header">
                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                    <div class="file-information">
                        <button id="btn-close" class="action-btn"
                            style="padding: 4px; height: 32px; min-width: 32px;" title="Close File">
                            <i class="ph ph-caret-left"></i><span class="btn-text"></span>
                        </button>
                        <input type="text" id="stat-filename" class="inline-input" style="width: 200px;"
                            value="No file loaded" title="Edit filename">
                        <input type="text" id="part-number" class="inline-input" style="width: 50px;"
                            placeholder="Part">
                        <input type="text" id="operation-number" class="inline-input" style="width: 50px;"
                            placeholder="Op">
                        <button id="btn-copy" class="action-btn"
                            style="padding: 4px; height: 32px; min-width: 32px;" title="Copy">
                            <i class="ph ph-copy"></i><span class="btn-text"></span>
                        </button>
                        <button id="btn-download" class="action-btn primary"
                            style="padding: 4px; height: 32px; min-width: 32px;" title="Download">
                            <i class="ph ph-download-simple"></i><span class="btn-text"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Container for workspace + controls -->
            <div class="container-horizontal">
                
                <!-- Main Workspace (Editor / Dropzone) -->
                <div class="workspace">

                    <!-- File Upload Area -->
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-content" style="pointer-events: none; position: relative; z-index: 2;">
                            <i class="ph ph-file-arrow-up"></i>
                            <h3>Upload GCode File</h3>
                            <p>Drag & drop your .txt, .nc, .NC, or .T file here</p>
                            <p class="text-small">or click to browse</p>
                            <button id="btn-paste" class="action-btn"
                                style="pointer-events: auto; margin: 16px auto 0; position: relative; z-index: 10;">
                                <i class="ph ph-clipboard"></i> Paste from Clipboard
                            </button>
                            <p class="text-small" style="margin-top: 16px;">(or press Ctrl+V)</p>
                        </div>
                        <input type="file" id="file-input" accept=".txt,.nc,.NC,.T" style="z-index: 1;">
                    </div>

                    <!-- Code Editor Area -->
                    <div id="editor-container" class="editor-container hidden">
                        <textarea id="code-editor" class="code-editor" spellcheck="false" placeholder="Or paste your GCode here..."></textarea>
                    </div>
                </div>

                <!-- Right Panel Space (Collapsible Controls) -->
                <aside id="controls-panel" class="controls-panel hidden">
                    <div id="panel-resizer" class="panel-resizer"></div>
                    <div class="panel-inner">
                        <div class="settings-section form-card" style="flex: 1;">
                            <div class="mod-tabs">
                                <button class="mod-tab active" data-target="mod-sequence">Sequence Detail</button>
                                <button class="mod-tab" data-target="mod-advanced">Advanced Features</button>
                            </div>

                            <div class="mod-content" id="mod-advanced">
                                <!-- GCode Header Block -->
                                <div style="margin-bottom: 24px;">
                                    <h3 style="margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">GCode Header Generation</h3>
                                    <div class="settings-grid">
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="header-stamp-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="header-stamp-toggle">Timestamped Updates</label>
                                        </div>
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="header-tools-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="header-tools-toggle">Tool List</label>
                                        </div>
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="header-vars-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="header-vars-toggle">Variables List</label>
                                        </div>
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="header-safety-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="header-safety-toggle">Safety Lines</label>
                                        </div>
                                    </div>
                                    
                                    <!-- History Container -->
                                    <div id="header-comments-config" class="probing-config hidden" style="margin-top: 12px;">
                                        <h4 style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;">Timestamps</h4>
                                        <div id="header-comments-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;">
                                            <!-- Injected by JS -->
                                        </div>
                                        <div style="display: flex; gap: 8px;">
                                            <input type="text" id="new-comment-input" class="inline-input extra-wide" placeholder="Describe update...">
                                            <button id="btn-add-comment" class="action-btn" style="padding: 4px 12px; height: 32px;"><i class="ph ph-plus"></i></button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Probing & Measurement Block -->
                                <div style="margin-bottom: 24px;">
                                    <h3 style="margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">Probing & Measurement</h3>
                                    <div class="settings-grid">
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="probing-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="probing-toggle">Enable Probing (#800)</label>
                                        </div>
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="length-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="length-toggle">Enable Length Measurement</label>
                                        </div>
                                    </div>

                                    <!-- Probing Configuration (shown when probing is enabled) -->
                                    <div id="probing-config" class="probing-config hidden" style="margin-top: 12px;">
                                        <div id="probing-cycles-list">
                                            <!-- Probe cycle cards injected by JS -->
                                        </div>
                                        <button id="btn-add-probe" class="action-btn" style="margin-top: 10px; width: 100%; justify-content: center;">
                                            <i class="ph ph-plus"></i> Add Probe Cycle
                                        </button>
                                    </div>
                                    
                                    <div id="length-config" class="probing-config hidden" style="margin-top: 12px;">
                                        <div id="tool-measurements-list" style="display: flex; flex-direction: column; gap: 8px;">
                                            <!-- Injected by JS -->
                                        </div>
                                    </div>
                                </div>

                                <!-- Variables & Zones Block -->
                                <div style="margin-bottom: 24px;">
                                    <h3 style="margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">Variables & Zones</h3>
                                    <div class="settings-grid">
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="var-tools-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="var-tools-toggle">Enable Variable Tools (#801-#850)</label>
                                        </div>
                                        <div class="input-group" style="padding-top: 0; border: none;">
                                            <label class="switch">
                                                <input type="checkbox" id="var-zones-toggle">
                                                <span class="slider round"></span>
                                            </label>
                                            <label for="var-zones-toggle">Enable Variable Work Zones (#851-#856)</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Sequence Detail Section (Now a Tab) -->
                            <div class="mod-content active printable-section" id="mod-sequence">
                                <div style="display: flex; flex-direction: column; height: 100%; min-height: 0;">
                                    <div class="table-header">
                                        <h1 style="margin-bottom: 8px;">Sequence Detail</h1>
                                        <button id="btn-print" class="action-btn" style="padding: 6px 12px;">
                                            <i class="ph ph-printer"></i> <span class="btn-text">Print</span>
                                        </button>
                                    </div>
                                    <div class="zones-container" id="zones-container"
                                        style="max-height: max-content; margin-bottom: 24px;">
                                        <!-- Data populated by JS -->
                                    </div>
                                    <div class="table-container">
                                        <table id="ops-table">
                                            <thead>
                                                <tr>
                                                    <th>N</th>
                                                    <th>Tool</th>
                                                    <th>Description</th>
                                                    <th title="Program Stop">M00</th>
                                                    <th title="Optional Stop">M01</th>
                                                    <th title="Coolant">M08</th>
                                                    <th>Subs</th>
                                                    <th>Feed</th>
                                                    <th>Speed</th>
                                                    <th>Min Z</th>
                                                    <th>X Range</th>
                                                    <th>Y Range</th>
                                                </tr>
                                            </thead>
                                            <tbody id="ops-table-body">
                                                <!-- Data populated by JS -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

    </main>
    <script src="js/gcode-parser.js"></script>
    <script src="js/probing-generator.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
